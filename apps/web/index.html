<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VR Tournament Platform</title>
    <link rel="preconnect" href="https://api.tournament.pixelpaddle.com" crossorigin />
    <style>
      :root {
        color-scheme: dark;
        --boot-bg: #0a0a0b;
        --boot-muted: #27272a;
        --boot-fg: #fafafa;
      }
      body {
        margin: 0;
        background: var(--boot-bg);
        color: var(--boot-fg);
        font-family: system-ui, -apple-system, sans-serif;
      }
      .app-boot {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .app-boot__bar {
        height: 4rem;
        border-bottom: 1px solid var(--boot-muted);
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
        gap: 0.75rem;
      }
      .app-boot__logo,
      .app-boot__line {
        background: var(--boot-muted);
        border-radius: 0.5rem;
        animation: boot-pulse 1.4s ease-in-out infinite;
      }
      .app-boot__logo {
        width: 2rem;
        height: 2rem;
      }
      .app-boot__line {
        height: 0.875rem;
        border-radius: 0.375rem;
      }
      .app-boot__main {
        flex: 1;
        max-width: 80rem;
        width: 100%;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fill, minmax(16rem, 1fr));
      }
      .app-boot__card {
        height: 10rem;
        background: var(--boot-muted);
        border-radius: 0.75rem;
        animation: boot-pulse 1.4s ease-in-out infinite;
      }
      .app-boot__card:nth-child(2) { animation-delay: 0.1s; }
      .app-boot__card:nth-child(3) { animation-delay: 0.2s; }
      .app-boot__card:nth-child(4) { animation-delay: 0.3s; }
      .app-boot__card:nth-child(5) { animation-delay: 0.4s; }
      .app-boot__card:nth-child(6) { animation-delay: 0.5s; }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot" aria-hidden="true" role="presentation">
        <div class="app-boot__bar">
          <div class="app-boot__logo"></div>
          <div class="app-boot__line" style="width: 7rem"></div>
        </div>
        <div class="app-boot__main">
          <div class="app-boot__card"></div>
          <div class="app-boot__card"></div>
          <div class="app-boot__card"></div>
          <div class="app-boot__card"></div>
          <div class="app-boot__card"></div>
          <div class="app-boot__card"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
